name: Otomatik APK Derleyici

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Repodaki Kodu Cek
        uses: actions/checkout@v4

      - name: Buildozer ile APK Derle
        uses: ArtemSundarev/buildozer-action@v1.2
        with:
          command: buildozer android debug
          buildozer_version: master

      - name: APK Dosyasini Paylas
        uses: actions/upload-artifact@v4
        with:
          name: Ekipman_Periyodik_Kontrol_Takibi_APK
          path: bin/*.apk
